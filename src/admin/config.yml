backend:
  name: git-gateway
  branch: main

# Nothing publishes straight to the live site.
# Contributions land as drafts and go through review.
publish_mode: editorial_workflow

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "src/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "articles/{{slug}}/"
    summary: "{{title}} — {{commit_date | date('YYYY-MM-DD')}}"
    fields:
      - { name: "layout", label: "Layout", widget: "hidden", default: "article.njk" }
      - { name: "title", label: "Headline", widget: "string" }
      - { name: "description", label: "Standfirst", widget: "text",
          hint: "One or two sentences. This is what shows on the article card and when the link is shared." }
      - { name: "date", label: "Date", widget: "datetime", format: "YYYY-MM-DD" }
      - { name: "author", label: "Author", widget: "string", required: false }
      - { name: "tag", label: "Kind", widget: "select",
          options: ["Analysis", "Explainer", "Policy", "Dispatch", "Opinion"], default: "Analysis" }
      - { name: "body", label: "Article", widget: "markdown",
          hint: "Name your sources in the sentence, not in a footnote." }

  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "src/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date | date('YYYY-MM-DD')}}"
    sortable_fields: ["date", "title"]
    fields:
      - { name: "title", label: "What is it?", widget: "string" }
      - { name: "date", label: "Date", widget: "datetime", format: "YYYY-MM-DD",
          hint: "Anything in the future shows under 'Coming up'. Anything past drops into 'What we've done'. It moves itself." }
      - { name: "time", label: "Time", widget: "string", required: false, hint: "e.g. 6:00 pm" }
      - { name: "kind", label: "Kind", widget: "select",
          options: ["Rally", "Screening", "Training", "Art build", "Tenants association meeting", "Teach-in", "Hearing / testimony", "Other"],
          default: "Rally" }
      - { name: "location", label: "Where", widget: "string" }
      - { name: "host", label: "Who's hosting", widget: "string", required: false }
      - { name: "link", label: "RSVP / info link", widget: "string", required: false }
      - { name: "body", label: "What's happening — and why should someone come?", widget: "markdown" }

  - name: "reading"
    label: "Reading list"
    label_singular: "Link"
    files:
      - name: "links"
        label: "Reading list"
        file: "src/data/links.json"
        fields:
          - name: "links"
            label: "Links"
            label_singular: "Link"
            widget: "list"
            summary: "{{fields.title}} — {{fields.source}}"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "url", label: "URL", widget: "string" }
              - { name: "source", label: "Publication", widget: "string",
                  hint: "e.g. Shelterforce, City Limits, NY State Senate" }
              - { name: "year", label: "Year", widget: "string" }
              - { name: "why", label: "Why it matters", widget: "text",
                  hint: "The whole point of this list. What does this piece tell you that nothing else does?" }
